[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.zip"
  [headers.values]
    Content-Type = "application/zip"
    Content-Disposition = "attachment; filename=\"mini-games.zip\""
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "/github"
  to = "https://github.com/rickyman0204/mini-games"
  status = 301