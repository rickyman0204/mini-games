<style>
:root {
  --bg-deep: #0d0503;
  --bg-primary: #1c0e08;
  --bg-card: #3a1f1a;
--bg-card-hover: #4d2a22;
  --gold: #d4a843;
  --gold-light: #f5d78c;
  --gold-pale: #fff3cd;
  --text: #e8d5c0;
  --text-muted: #8b7060;
  --accent: #c94040;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-layer {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}
.bg-layer::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(180,120,40,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(120,40,20,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 20% 50%, rgba(180,100,30,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(180,100,30,0.04) 0%, transparent 50%);
}
.bg-layer::after {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,220,160,0.3) 50%, transparent),
    radial-gradient(1px 1px at 25% 35%, rgba(255,200,140,0.25) 50%, transparent),
    radial-gradient(1.5px 1.5px at 40% 8%, rgba(255,220,160,0.35) 50%, transparent),
    radial-gradient(1px 1px at 55% 25%, rgba(255,200,140,0.2) 50%, transparent),
    radial-gradient(1.5px 1.5px at 70% 12%, rgba(255,220,160,0.3) 50%, transparent),
    radial-gradient(1px 1px at 85% 30%, rgba(255,200,140,0.25) 50%, transparent),
    radial-gradient(1px 1px at 15% 55%, rgba(255,200,140,0.2) 50%, transparent),
    radial-gradient(1.5px 1.5px at 60% 45%, rgba(255,220,160,0.2) 50%, transparent),
    radial-gradient(1px 1px at 90% 60%, rgba(255,200,140,0.15) 50%, transparent),
    radial-gradient(1px 1px at 30% 75%, rgba(255,200,140,0.2) 50%, transparent);
}

.glow-orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); opacity: 0.06; }
.glow-orb.top { width: 500px; height: 500px; background: #d4a843; top: -200px; left: 50%; transform: translateX(-50%); }
.glow-orb.left { width: 300px; height: 300px; background: #c94040; bottom: 100px; left: -100px; }
.glow-orb.right { width: 300px; height: 300px; background: #d4a843; top: 40%; right: -100px; }

.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

.header { text-align: center; padding: 60px 0 40px; position: relative; }
.header-icon { font-size: 56px; display: block; margin-bottom: 16px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 20px rgba(212,168,67,0.3)); }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.header h1 { font-size: clamp(32px, 5vw, 52px); font-weight: 900; background: linear-gradient(180deg, #f5d78c 0%, #d4a843 40%, #a07828 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 0.06em; margin-bottom: 12px; }
.header .subtitle { color: var(--text-muted); font-size: 16px; letter-spacing: 0.15em; }
.header .desc { color: var(--text-muted); font-size: 14px; margin-top: 12px; line-height: 1.8; max-width: 560px; margin-left: auto; margin-right: auto; }
.header .desc strong { color: var(--gold-light); }
.header .stats { display: inline-flex; gap: 32px; margin-top: 24px; padding: 16px 32px; background: rgba(42,21,18,0.6); border: 1px solid rgba(212,168,67,0.15); border-radius: 40px; backdrop-filter: blur(10px); }
.stat-item { text-align: center; }
.stat-num { font-size: 28px; font-weight: 700; color: var(--gold); display: block; }
.stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

.games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; padding: 20px 0 60px; }

.game-card {
  background: var(--bg-card); border: 1px solid rgba(212,168,67,0.08); border-radius: var(--radius);
  padding: 24px; cursor: pointer; transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative; overflow: hidden;
}
.game-card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 0%, rgba(212,168,67,0.06) 0%, transparent 70%); opacity: 0; transition: opacity 0.35s; }
.game-card:hover { background: var(--bg-card-hover); border-color: rgba(212,168,67,0.25); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 60px rgba(212,168,67,0.06); }
.game-card:hover::before { opacity: 1; }
.game-card:hover .card-icon { transform: scale(1.1) rotate(-5deg); }
.game-card:hover .card-arrow { opacity: 1; transform: translateX(0); }
.game-card.active { border-color: var(--gold); box-shadow: 0 0 30px rgba(212,168,67,0.2); }

.card-number { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; font-weight: 600; }
.card-icon { font-size: 40px; margin-bottom: 12px; display: block; transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
.card-title { font-size: 18px; font-weight: 700; color: var(--gold-light); margin-bottom: 4px; letter-spacing: 0.03em; }
.card-cost { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
.card-arrow { position: absolute; right: 20px; top: 50%; transform: translateY(-50%) translateX(-8px); font-size: 20px; color: var(--gold); opacity: 0; transition: all 0.35s; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }

.modal {
  background: linear-gradient(180deg, #2a1512 0%, #1c0e08 100%);
  border: 1px solid rgba(212,168,67,0.2); border-radius: 20px;
  padding: 40px; max-width: 560px; width: 90vw; max-height: 85vh; overflow-y: auto;
  position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  transform: translateY(20px); transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-close {
  position: absolute; top: 16px; right: 20px; font-size: 28px; color: var(--text-muted);
  cursor: pointer; background: none; border: none; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center; border-radius: 50%;
  transition: all 0.2s;
}
.modal-close:hover { color: var(--gold); background: rgba(255,255,255,0.05); }

.modal-icon { font-size: 64px; text-align: center; display: block; margin-bottom: 16px; }
.modal-title { font-size: 28px; font-weight: 900; color: var(--gold-light); text-align: center; margin-bottom: 4px; }
.modal-number { text-align: center; font-size: 12px; color: var(--gold); letter-spacing: 0.15em; margin-bottom: 24px; }

.modal-section { margin-bottom: 20px; }
.modal-section h3 { font-size: 14px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.modal-section p { font-size: 15px; color: var(--text); line-height: 1.8; }

.modal-meta { display: flex; gap: 16px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
.modal-meta span { padding: 8px 18px; background: rgba(212,168,67,0.08); border: 1px solid rgba(212,168,67,0.15); border-radius: 24px; font-size: 13px; color: var(--gold-light); }
.modal-meta .cost-high { color: var(--accent); border-color: rgba(201,64,64,0.3); }
.modal-meta .cost-free { color: #4caf50; border-color: rgba(76,175,80,0.3); }

.modal-btn {
  display: block; text-align: center; margin: 24px auto 0;
  padding: 14px 32px; background: linear-gradient(135deg, #d4a843 0%, #b8862d 100%);
  color: #1c0e08; font-size: 15px; font-weight: 700; border-radius: 50px;
  text-decoration: none; letter-spacing: 0.04em; transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(212,168,67,0.25); max-width: 240px;
}
.modal-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(212,168,67,0.35); }

.section-title { text-align: center; padding: 20px 0 28px; font-size: 13px; color: var(--text-muted); letter-spacing: 0.2em; text-transform: uppercase; }

.footer { text-align: center; padding: 40px 24px 60px; color: var(--text-muted); font-size: 13px; position: relative; z-index: 1; }
.footer a { color: var(--gold); text-decoration: none; transition: color 0.2s; }
.footer a:hover { color: var(--gold-light); }
.footer .divider { margin: 0 12px; opacity: 0.3; }

.cta-wrap { display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:16px; text-align: center; padding: 40px 0 20px; position: relative; z-index: 1; }
.cta-btn {
  display: inline-flex; align-items: center; gap: 10px; padding: 16px 36px;
  background: linear-gradient(135deg, #d4a843 0%, #b8862d 100%); color: #1c0e08;
  font-size: 16px; font-weight: 700; border-radius: 50px; text-decoration: none;
  letter-spacing: 0.04em; transition: all 0.3s; box-shadow: 0 4px 24px rgba(212,168,67,0.25);
}
.cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 36px rgba(212,168,67,0.35); }

.qr-section {
  text-align: center; padding: 0 0 40px; position: relative; z-index: 1;
}
.qr-label {
  font-size: 14px; color: var(--text-muted); margin-bottom: 16px; letter-spacing: 0.06em;
}
.qr-img {
  border-radius: 16px; background: white; padding: 8px;
  box-shadow: 0 4px 24px rgba(212,168,67,0.15); transition: transform 0.3s;
}
.qr-img:hover { transform: scale(1.05); }
.cta-col {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.qr-inline {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.qr-inline img {
  transition: transform 0.3s; box-shadow: 0 4px 24px rgba(212,168,67,0.18);
}
.qr-inline img:hover { transform: scale(1.08); }
.qr-inline span { font-size: 11px; color: var(--text-muted); }
.qr-url {
  margin-top: 12px; font-size: 12px; color: var(--text-muted);
  font-family: 'Consolas', 'Courier New', monospace; letter-spacing: 0.04em;
}

@media (max-width: 768px) {
  .header { padding: 40px 0 28px; }
  .header .stats { gap: 20px; padding: 12px 24px; }
  .games-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .game-card { padding: 18px 14px; }
  .card-icon { font-size: 32px; }
  .card-title { font-size: 15px; }
  .modal { padding: 28px 20px; }
  .modal-icon { font-size: 48px; }
  .modal-title { font-size: 22px; }
}
</style>
</head>

const games = [
  {id:1,icon:"🃏",name:"成双成对",cost:5,free:false,rule:"翻开卡牌寻找相同的配对。每次翻开两张牌，如果图案相同则配对成功并得分；如果不同则翻回，考验你的记忆力！",tip:"记住每张牌的位置，尽量用最少的翻牌次数完成配对。",cat:"记忆"},
  {id:2,icon:"🌳",name:"苹果树",cost:0,free:true,rule:"摇晃苹果树让苹果落地。点击摇树按钮，苹果会从树上随机掉落，接住苹果即可得分。注意避开掉落的虫子和烂苹果！",tip:"站对位置，眼疾手快才能接住更多好苹果。",cat:"反应"},
  {id:3,icon:"💣",name:"拆炸弹",cost:30,free:false,rule:"多条线路中只有一条是安全的。选择正确的线路拆除炸弹，选错会导致炸弹爆炸扣金币。凭借直觉和运气挑选正确线路！",tip:"每局奖励丰厚，但风险也很大，谨慎选择。",cat:"运气"},
  {id:4,icon:"🕳️",name:"躲藏山洞",cost:50,free:false,rule:"选择其中一个山洞躲藏。每个山洞隐藏着不同的奖励或惩罚——可能发现宝藏，也可能遭遇危险。全靠运气！",tip:"山洞背后的结果完全随机，但高风险也意味着高回报。",cat:"运气"},
  {id:5,icon:"🗺️",name:"迷宫探险",cost:50,free:false,rule:"在迷宫中寻找出口。使用方向键或点击控制角色移动，避开死胡同找到正确的路径到达终点即可获胜。",tip:"从终点倒推路线往往比从起点走更容易找到正确路径。",cat:"益智"},
  {id:6,icon:"🎣",name:"钓鱼",cost:30,free:false,rule:"选择钓鱼地点后等待鱼儿上钩。不同地点有不同种类的鱼，钓到稀有鱼可以获得更多金币。看准时机提竿！",tip:"观察浮漂的动静，找准最佳的提竿时机。",cat:"休闲"},

  {id:19,icon:"💪",name:"力量比拼",cost:100,free:false,rule:"与AI对手进行力量对决。快速连击指定按键积攒力量条，时间结束时力量值更高的一方获胜！",tip:"手指放轻松，保持均匀高速的点击频率。",cat:"动作"},

];

function openModal(game) {
  const catColors = {"记忆":"#4caf50","反应":"#ff9800","运气":"#9c27b0","益智":"#2196f3","休闲":"#8bc34a","竞猜":"#e91e63","养成":"#00bcd4","动作":"#f44336","棋牌":"#795548"};
  const catCol = catColors[game.cat] || '#d4a843';
  const costClass = game.free ? 'cost-free' : (game.cost >= 30 ? 'cost-high' : '');
  
  document.getElementById('modalContent').innerHTML = `
    <span class="modal-icon">${game.icon}</span>
    <h2 class="modal-title">${game.name}</h2>
    <p class="modal-number">GAME ${String(game.id).padStart(2,'0')}</p>
    <div class="modal-meta">
      <span class="${costClass}">${game.free ? '🆓 免费' : '💰 '+game.cost+' 金币'}</span>
      <span style="border-color:${catCol};color:${catCol}">📂 ${game.cat}</span>
    </div>
    <div class="modal-section">
      <h3>📖 游戏规则</h3>
      <p>${game.rule}</p>
    </div>
    <div class="modal-section">
      <h3>💡 玩法提示</h3>
      <p>${game.tip}</p>
    </div>
    <a class="modal-btn" href="/mini-games.zip" download>⬇ 下载 EXE 桌面版游玩</a>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

/* Render game cards */
const grid = document.getElementById('gamesGrid');
games.forEach(g => {
  const costHtml = g.free ? '<span style="color:#4caf50">🆓 免费</span>' : '💰 ' + g.cost;
  const card = document.createElement('div');
  card.className = 'game-card';
  card.innerHTML = `
    <span class="card-number">GAME ${String(g.id).padStart(2,'0')}</span>
    <span class="card-icon">${g.icon}</span>
    <span class="card-title">${g.name}</span>
    <span class="card-cost">${costHtml}</span>
    <span class="card-arrow">→</span>
  `;
  card.addEventListener('click', function() { openModal(g); });
  grid.appendChild(card);
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
